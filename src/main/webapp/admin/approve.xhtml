<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Admin – Einträge genehmigen</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 30px auto; color: #333; }
        h1 { color: #2e7d32; }
        table { border-collapse: collapse; width: 100%; }
        th { background-color: #2e7d32; color: white; padding: 8px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f5f5f5; }
        input[type="submit"], button {
            background-color: #2e7d32; color: white; border: none;
            padding: 5px 10px; cursor: pointer; border-radius: 3px;
        }
        input[type="submit"]:hover, button:hover { background-color: #1b5e20; }
        a { color: #2e7d32; }
    </style>
</h:head>

<h:body>
    <h:panelGroup rendered="#{!loginBean.admin}">
        <p>Kein Zugriff. <h:outputLink value="#{request.contextPath}/login.xhtml">Zum Login</h:outputLink></p>
    </h:panelGroup>

    <h:panelGroup rendered="#{loginBean.admin}">
    <h1>Ausstehende Einträge</h1>

    <h:form>
        <h:commandButton value="Logout" action="#{loginBean.logout}"/>
    </h:form>

    <h:dataTable value="#{adminBean.pendingEntries}" var="e"
                 border="1" cellpadding="5">
        <h:column>
            <f:facet name="header">Land</f:facet>
            #{e.country}
        </h:column>
        <h:column>
            <f:facet name="header">Code</f:facet>
            #{e.countryCode}
        </h:column>
        <h:column>
            <f:facet name="header">Jahr</f:facet>
            #{e.year}
        </h:column>
        <h:column>
            <f:facet name="header">CO2 (kt)</f:facet>
            #{e.co2Kt}
        </h:column>
        <h:column>
            <f:facet name="header">Aktion</f:facet>
            <h:form>
                <h:inputHidden value="#{e.id}" id="entryId"/>
                <h:commandButton value="Genehmigen"
                    action="#{adminBean.approve(e.id)}"/>
            </h:form>
        </h:column>
    </h:dataTable>

    <br/>
    <h:outputLink value="#{request.contextPath}/index.xhtml">
        Zurück zur Startseite
    </h:outputLink>
    </h:panelGroup>

</h:body>
</html>
